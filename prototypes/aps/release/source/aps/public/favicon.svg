<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e6fd9"/>
      <stop offset="100%" stop-color="#0d4a9e"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Gantt / 排程条 -->
  <rect x="5" y="18" width="12" height="4" rx="1.5" fill="#fff" opacity=".9"/>
  <rect x="10" y="11" width="14" height="4" rx="1.5" fill="#fff" opacity=".55"/>
  <rect x="15" y="22" width="9" height="4" rx="1.5" fill="#fff" opacity=".65"/>
  <!-- 连接节点（小圆点）-->
  <circle cx="6" cy="20" r="1.8" fill="#7fdbca"/>
  <circle cx="17" cy="13" r="1.8" fill="#7fdbca"/>
  <circle cx="17" cy="24" r="1.8" fill="#7fdbca"/>
</svg>